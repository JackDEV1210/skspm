        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => { toast.classList.add('translate-x-full'); }, 3000);
        }

            const cleanCode = code.replace(/\s/g, '');
            if (cleanCode.includes('print("Hargaialah",harga)')) {
                if(!state.m2_q1_done) { addXP(150); state.m2_q1_done = true; }
                showToast("Berjaya Dibaiki!", "Ejaan 'print' telah dibetulkan. Kod berjaya dijalankan.");
            } else {
                showToast("Ralat Masih Wujud", "Sila pastikan ejaan 'print' adalah tepat.", "error");
            }
        }

        function checkM2Q2() {
            const code = document.getElementById('m2-q2-code').value;
            const cleanCode = code.replace(/\s/g, '');
            if (cleanCode.includes('purata=(m1+m2+m3)/3')) {
                if(!state.m2_q2_done) { addXP(150); state.m2_q2_done = true; }
                showToast("Logik Dibetulkan!", "Penggunaan kurungan ( ) memastikan hasil tambah dikira dahulu.");
            } else {
                showToast("Masih Ralat Logik", "Anda perlu menambah semua markah DAHULU sebelum bahagi 3. Guna ().", "error");
            }
        }

        function checkM3() {
            const val = document.getElementById('m3-q1-input').value;
            if (val === '6') {
                if(!state.m3_q1_done) { addXP(200); state.m3_q1_done = true; }
                showToast("Penjejakan Sempurna!", "Lelaran akhir: i=3, jumlah sebelumnya=3. 3+3 = 6.");
            } else {
                showToast("Penjejakan Tersasar", "Cuba kira: Pada lelaran ke-3, i=3. Tambahkan dengan jumlah sebelumnya.", "error");
            }
        }

        function toggleCodeStyle(type) {
            const caca = document.getElementById('code-caca');
            const kualiti = document.getElementById('code-kualiti');
            const btnCaca = document.getElementById('tab-caca');
            const btnKualiti = document.getElementById('tab-kualiti');

            if (type === 'caca') {
                caca.classList.remove('hidden');
                kualiti.classList.add('hidden');
                kualiti.classList.remove('animate-fade-in');
                
                btnCaca.classList.add('text-purple-400', 'bg-slate-800/30');
                btnCaca.classList.remove('text-slate-400', 'bg-slate-800');
                if(window.innerWidth >= 768) {
                    btnCaca.classList.add('border-purple-500');
                    btnCaca.classList.remove('border-transparent');
                }
                
                btnKualiti.classList.remove('text-purple-400', 'bg-slate-800/30', 'border-purple-500');
                btnKualiti.classList.add('text-slate-400', 'bg-slate-800', 'border-transparent');
            } else {
                caca.classList.add('hidden');
                kualiti.classList.remove('hidden');
                kualiti.classList.add('animate-fade-in');
                
                btnKualiti.classList.add('text-purple-400', 'bg-slate-800/30');
                btnKualiti.classList.remove('text-slate-400', 'bg-slate-800');
                if(window.innerWidth >= 768) {
                    btnKualiti.classList.add('border-purple-500');
                    btnKualiti.classList.remove('border-transparent');
                }
                
                btnCaca.classList.remove('text-purple-400', 'bg-slate-800/30', 'border-purple-500');
                btnCaca.classList.add('text-slate-400', 'bg-slate-800', 'border-transparent');
            }
        }

        function checkM4(answer) {
            if (answer === 'C') {
                if(!state.m4_q1_done) { addXP(100); state.m4_q1_done = true; }
                showToast("Pilihan Bijak!", "'bakiAkaunBank' jelas, deskriptif, dan menggunakan camelCase.");
            } else {
                showToast("Kurang Sesuai", "Pilih nama yang menerangkan fungsi data dengan lebih jelas.", "error");
            }
        }

        function checkUjian() {
            const answers = { uq1: 'A', uq2: 'C', uq3: 'B', uq4: 'B', uq5: 'C', uq6: 'C', uq7: 'B', uq8: 'C', uq9: 'B', uq10: 'B', uq11: 'B', uq12: 'B', uq13: 'C', uq14: 'B', uq15: 'B' };
            let allAnswered = true, allCorrect = true;

            for (let i = 1; i <= 15; i++) {
                const q = document.querySelector(`input[name="uq${i}"]:checked`);
                if (!q) { allAnswered = false; break; }
                if (q.value !== answers[`uq${i}`]) { allCorrect = false; }
            }

            if (!allAnswered) {
                showToast("Perhatian", "Sila jawab kesemua 15 soalan.", "error"); return;
            }

            if (allCorrect) {
                if(!state.ujian_done) { addXP(1000); state.ujian_done = true; }
                document.getElementById('content-area').innerHTML = `
                    <div class="animate-fade-in text-center pt-10 md:pt-20 pb-20">
                        <i class="fas fa-medal text-7xl md:text-9xl text-yellow-400 mb-8 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]"></i>
                        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Tahniah! Anda Lulus.</h1>
                        <p class="text-sm md:text-xl text-slate-300 max-w-2xl mx-auto px-4">Anda telah menguasai asas Ralat dan Amalan Terbaik Pengekodan.</p>
                        <p class="mt-8 text-xl md:text-2xl font-bold text-yellow-400">Total XP: ${currentXP}</p>
                        <div class="mt-12">
                            <a href="index.html" class="inline-block bg-blue-600 hover:bg-blue-500 text-white px-6 md:px-8 py-3 md:py-4 rounded-xl font-bold text-sm md:text-lg transition-colors shadow-lg shadow-blue-900/50">
                                <i class="fas fa-home mr-2"></i> Kembali ke Portal Utama
                            </a>
                        </div>
                    </div>
                `;
                window.scrollTo(0, 0);
            } else {
                showToast("Gagal", "Terdapat jawapan yang salah. Sila cuba lagi.", "error");
            }
        }

        window.onload = () => { loadModule('modul1'); };
    </script>
</body>
</html>

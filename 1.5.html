        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            // Highlight animation
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);

            const code = document.getElementById('m2-q1-code').value;
            const cleanCode = code.replace(/\s/g, '');
            if (cleanCode.includes('print("Hargaialah",harga)')) {
                if(!state.m2_q1_done) { addXP(150); state.m2_q1_done = true; }
                showToast("Berjaya Dibaiki!", "Ejaan 'print' telah dibetulkan. Kod berjaya dijalankan.");
            } else {
                showToast("Ralat Masih Wujud", "Sila semak baris 2. Pastikan ejaan 'print' adalah tepat.", "error");
            }
        }

        function checkM2Q2() {
            const code = document.getElementById('m2-q2-code').value;
            const cleanCode = code.replace(/\s/g, '');
            if (cleanCode.includes('purata=(m1+m2+m3)/3')) {
                if(!state.m2_q2_done) { addXP(150); state.m2_q2_done = true; }
                showToast("Logik Dibetulkan!", "Penggunaan kurungan memastikan penambahan dibuat sebelum pembahagian. Output: 80.0");
            } else {
                showToast("Masih Ralat Logik", "Ingat hukum matematik. Anda perlu menambah semua markah DAHULU sebelum bahagi 3. Gunakan kurungan ().", "error");
            }
        }

        function checkM3() {
            const val = document.getElementById('m3-q1-input').value;
            if (val === '6') {
                if(!state.m3_q1_done) { addXP(200); state.m3_q1_done = true; }
                showToast("Penjejakan Sempurna!", "Lelaran akhir: i=3, jumlah sebelumnya=3. 3+3 = 6.");
            } else {
                showToast("Penjejakan Tersasar", "Cuba kira semula. Pada lelaran ke-3, i adalah 3. Tambahkan dengan jumlah sebelumnya.", "error");
            }
        }

        function toggleCodeStyle(type) {
            const caca = document.getElementById('code-caca');
            const kualiti = document.getElementById('code-kualiti');
            const btnCaca = document.getElementById('tab-caca');
            const btnKualiti = document.getElementById('tab-kualiti');

            if (type === 'caca') {
                caca.classList.remove('hidden');
                kualiti.classList.add('hidden');
                kualiti.classList.remove('animate-fade-in');
                
                btnCaca.classList.add('text-purple-400', 'border-purple-500', 'bg-slate-800/30');
                btnCaca.classList.remove('text-slate-400', 'border-transparent');
                
                btnKualiti.classList.remove('text-purple-400', 'border-purple-500', 'bg-slate-800/30');
                btnKualiti.classList.add('text-slate-400', 'border-transparent');
            } else {
                caca.classList.add('hidden');
                kualiti.classList.remove('hidden');
                kualiti.classList.add('animate-fade-in');
                
                btnKualiti.classList.add('text-purple-400', 'border-purple-500', 'bg-slate-800/30');
                btnKualiti.classList.remove('text-slate-400', 'border-transparent');
                
                btnCaca.classList.remove('text-purple-400', 'border-purple-500', 'bg-slate-800/30');
                btnCaca.classList.add('text-slate-400', 'border-transparent');
            }
        }

        function checkM4(answer) {
            if (answer === 'C') {
                if(!state.m4_q1_done) { addXP(100); state.m4_q1_done = true; }
                showToast("Pilihan Bijak!", "'bakiAkaunBank' jelas, deskriptif, dan menggunakan format camelCase.");
            } else {
                showToast("Kurang Sesuai", "Nama pemboleh ubah tersebut tidak menerangkan data dengan jelas.", "error");
            }
        }

        function checkUjian() {
            // Skema Jawapan untuk 15 Soalan
            const answers = {
                uq1: 'A', uq2: 'C', uq3: 'B', uq4: 'B', uq5: 'C',
                uq6: 'C', uq7: 'B', uq8: 'C', uq9: 'B', uq10: 'B',
                uq11: 'B', uq12: 'B', uq13: 'C', uq14: 'B', uq15: 'B'
            };

            let allAnswered = true;
            let allCorrect = true;

            for (let i = 1; i <= 15; i++) {
                const q = document.querySelector(`input[name="uq${i}"]:checked`);
                if (!q) {
                    allAnswered = false;
                    break;
                }
                if (q.value !== answers[`uq${i}`]) {
                    allCorrect = false;
                }
            }

            if (!allAnswered) {
                showToast("Perhatian", "Sila jawab kesemua 15 soalan sebelum menekan butang hantar.", "error");
                return;
            }

            if (allCorrect) {
                if(!state.ujian_done) { 
                    addXP(1000); // Ganjaran besar untuk boss battle
                    state.ujian_done = true; 
                }
                
                document.getElementById('content-area').innerHTML = `
                    <div class="animate-fade-in text-center pt-20 pb-20">
                        <i class="fas fa-medal text-9xl text-yellow-400 mb-8 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]"></i>
                        <h1 class="text-4xl font-bold text-white mb-4">Tahniah! Anda Lulus Cemerlang.</h1>
                        <p class="text-xl text-slate-300 max-w-2xl mx-auto">Anda telah berjaya menjawab kesemua 15 soalan dengan tepat. Anda kini diiktiraf telah menguasai asas Ralat, Penyahpepijatan, Penjejakan Nilai dan Gaya Pengekodan yang baik!</p>
                        <p class="mt-8 text-2xl font-bold text-yellow-400">Total XP: ${currentXP}</p>
                        
                        <div class="mt-12">
                            <a href="index.html" class="inline-block bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition-colors shadow-lg shadow-blue-900/50 transform hover:-translate-y-1">
                                <i class="fas fa-home mr-2"></i> Kembali ke Portal Utama
                            </a>
                        </div>
                    </div>
                `;
                window.scrollTo(0, 0);
            } else {
                showToast("Gagal", "Terdapat jawapan yang salah. Sila semak semula modul dan cuba lagi.", "error");
            }
        }

        // Initialize App on load directly to Module 1
        window.onload = () => {
            loadModule('modul1');
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <script src="analytics-include.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademi Pengekodan: Pangkalan Data Hubungan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .nav-item.active {
            background-color: #f97316;
            color: white;
            font-weight: 600;
        }

        .highlight-red { background-color: rgba(239, 68, 68, 0.2); border-color: #ef4444 !important; transition: all 0.3s; }
        .highlight-orange { background-color: rgba(249, 115, 22, 0.2); border-color: #f97316 !important; transition: all 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden selection:bg-orange-500 selection:text-white bg-slate-900">

    <!-- Mobile Header -->
    <div class="md:hidden bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-30">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
            <i class="fas fa-database text-orange-400"></i> Akademi Kod (2.1)
        </h1>
        <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/80 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-50 w-72 bg-slate-800 border-r border-slate-700 flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-700 hidden md:block">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-database text-orange-400"></i>
                Akademi Kod
            </h1>
            <p class="text-xs text-slate-400 mt-2">Sains Komputer - Topik 2.1</p>
        </div>

        <div class="p-4 md:hidden flex justify-between items-center border-b border-slate-700">
            <span class="text-white font-bold text-lg">Menu Navigasi</span>
            <button id="close-sidebar-btn" class="text-slate-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-300">Pengalaman (XP)</span>
                <span id="xp-counter" class="text-sm font-bold text-yellow-400">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5">
                <div id="xp-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 mb-4 rounded-lg text-left text-white bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600 shadow-md">
                <i class="fas fa-arrow-left w-5 text-center text-rose-400"></i>
                <span class="font-bold">Kembali ke Portal</span>
            </a>

            <div class="pt-2 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Modul Pembelajaran</div>
            <button onclick="loadModule('modul1')" id="nav-modul1" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-shield-alt w-5 text-center text-emerald-400"></i>
                <span class="text-sm md:text-base">M1: Isu Data</span>
            </button>
            <button onclick="loadModule('modul2')" id="nav-modul2" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-project-diagram w-5 text-center text-blue-400"></i>
                <span class="text-sm md:text-base">M2: Model Data</span>
            </button>
            <button onclick="loadModule('modul3')" id="nav-modul3" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-key w-5 text-center text-purple-400"></i>
                <span class="text-sm md:text-base">M3: ERD</span>
            </button>

            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Penilaian</div>
            <button onclick="loadModule('ujian')" id="nav-ujian" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-trophy w-5 text-center text-yellow-400"></i>
                <span class="text-sm md:text-base">Ujian Akhir (Boss)</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-y-auto h-full">
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-5 right-5 z-50 transform transition-transform duration-300 translate-x-full bg-slate-800 border border-slate-600 px-4 py-3 md:px-6 md:py-4 rounded-lg shadow-xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400 text-lg md:text-xl"></i>
            <div>
                <h4 id="toast-title" class="font-bold text-white text-sm md:text-base">Berjaya!</h4>
                <p id="toast-msg" class="text-xs md:text-sm text-slate-300">Jawapan anda tepat. +50 XP</p>
            </div>
        </div>

        <div id="content-area" class="max-w-5xl mx-auto p-4 md:p-8 pb-24 md:pb-20">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        // --- Mobile Menu Logic ---
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        // --- State Management ---
        let currentXP = 0;
        const state = { m1_done: false, m2_done: false, m3_done: false, ujian_done: false };

        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => { toast.classList.add('translate-x-full'); }, 3000);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${moduleId}`);
            if(activeNav) activeNav.classList.add('active');
        }

        function loadModule(moduleId) {
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            const container = document.getElementById('content-area');
            updateNavActive(moduleId);
            window.scrollTo(0, 0);
            
            let html = '';

            switch (moduleId) {
                case 'modul1':
                    if(!state.m1_done) { addXP(50); state.m1_done = true; }
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-orange-500/20 text-orange-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">2.1.1</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Integriti, Ketekalan & Kelewahan</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 md:mb-8 text-sm md:text-lg">Memahami tiga konsep utama kualiti data pangkalan data.</p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 md:mb-10">
                                <!-- Integriti -->
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 hover:-translate-y-1 transition-transform">
                                    <div class="w-10 h-10 md:w-12 md:h-12 bg-emerald-500/20 text-emerald-400 rounded-lg flex items-center justify-center text-lg md:text-xl mb-4">
                                        <i class="fas fa-shield-alt"></i>
                                    </div>
                                    <h3 class="text-base md:text-lg font-bold text-white mb-2">Integriti Data</h3>
                                    <p class="text-slate-400 text-xs md:text-sm">Merujuk kepada kesahihan dan ketepatan data mematuhi rules.</p>
                                    <div class="mt-4 p-3 bg-slate-900 rounded text-xs text-slate-300 border-l-4 border-emerald-500">
                                        <strong>Cth:</strong> Markah mesti 0-100.
                                    </div>
                                </div>

                                <!-- Ketekalan -->
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 hover:-translate-y-1 transition-transform">
                                    <div class="w-10 h-10 md:w-12 md:h-12 bg-blue-500/20 text-blue-400 rounded-lg flex items-center justify-center text-lg md:text-xl mb-4">
                                        <i class="fas fa-sync-alt"></i>
                                    </div>
                                    <h3 class="text-base md:text-lg font-bold text-white mb-2">Ketekalan Data</h3>
                                    <p class="text-slate-400 text-xs md:text-sm">Keadaan di mana data yang sama di tempat berbeza memberikan nilai seragam.</p>
                                    <div class="mt-4 p-3 bg-slate-900 rounded text-xs text-slate-300 border-l-4 border-blue-500">
                                        <strong>Cth:</strong> Alamat bertukar automatik di semua sistem.
                                    </div>
                                </div>

                                <!-- Kelewahan -->
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 hover:-translate-y-1 transition-transform">
                                    <div class="w-10 h-10 md:w-12 md:h-12 bg-rose-500/20 text-rose-400 rounded-lg flex items-center justify-center text-lg md:text-xl mb-4">
                                        <i class="fas fa-copy"></i>
                                    </div>
                                    <h3 class="text-base md:text-lg font-bold text-white mb-2">Kelewahan Data</h3>
                                    <p class="text-slate-400 text-xs md:text-sm">Pengulangan data yang sama. Membazirkan ruang storan.</p>
                                    <div class="mt-4 p-3 bg-slate-900 rounded text-xs text-slate-300 border-l-4 border-rose-500">
                                        <strong>Kesan:</strong> Menyebabkan ketidaktekalan (ralat) mudah berlaku.
                                    </div>
                                </div>
                            </div>

                            <!-- Interactive Redundancy Demo -->
                            <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-3 md:mb-4"><i class="fas fa-laptop-code text-orange-400 mr-2"></i>Simulasi: Menyelesaikan Kelewahan</h3>
                                <p class="text-slate-400 mb-4 md:mb-6 text-sm">Perhatikan jadual di bawah. Klik butang untuk lihat proses penormalan.</p>
                                
                                <div class="flex flex-wrap gap-3 mb-6">
                                    <button onclick="highlightRedundancy()" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 text-white font-medium rounded-lg shadow-sm transition text-sm">1. Kenal Pasti Kelewahan</button>
                                    <button onclick="normalizeTable()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg shadow-sm transition text-sm">2. Lakukan Penormalan</button>
                                    <button onclick="resetTable()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 font-medium rounded-lg shadow-sm transition text-sm">Reset</button>
                                </div>

                                <!-- Unnormalized Table -->
                                <div id="unnormalized-view" class="overflow-x-auto transition-all duration-500">
                                    <h4 class="font-semibold text-rose-400 mb-2 text-sm">Jadual Pelajar (Bermasalah)</h4>
                                    <table class="w-full text-left border-collapse bg-slate-900 rounded-lg overflow-hidden border border-slate-700 min-w-[500px]">
                                        <thead class="bg-slate-700 text-white text-xs md:text-sm">
                                            <tr>
                                                <th class="p-2 md:p-3 border-b border-slate-600">ID</th>
                                                <th class="p-2 md:p-3 border-b border-slate-600">Nama Pelajar</th>
                                                <th class="p-2 md:p-3 border-b border-slate-600">Kelas</th>
                                                <th class="p-2 md:p-3 border-b border-slate-600">Guru Kelas</th>
                                            </tr>
                                        </thead>
                                        <tbody class="text-slate-300 text-xs md:text-sm">
                                            <tr><td class="p-2 md:p-3 border-b border-slate-700">P001</td><td class="p-2 md:p-3 border-b border-slate-700">Ahmad</td><td class="p-2 md:p-3 border-b border-slate-700 highlight-target">5 Sains</td><td class="p-2 md:p-3 border-b border-slate-700 highlight-target">Cikgu Aminah</td></tr>
                                            <tr><td class="p-2 md:p-3 border-b border-slate-700">P002</td><td class="p-2 md:p-3 border-b border-slate-700">Siti</td><td class="p-2 md:p-3 border-b border-slate-700 highlight-target">5 Sains</td><td class="p-2 md:p-3 border-b border-slate-700 highlight-target">Cikgu Aminah</td></tr>
                                            <tr><td class="p-2 md:p-3 border-b border-slate-700">P003</td><td class="p-2 md:p-3 border-b border-slate-700">Muthu</td><td class="p-2 md:p-3 border-b border-slate-700 highlight-target2">5 Sastera</td><td class="p-2 md:p-3 border-b border-slate-700 highlight-target2">Cikgu Kamal</td></tr>
                                            <tr><td class="p-2 md:p-3">P004</td><td class="p-2 md:p-3">Wong</td><td class="p-2 md:p-3 highlight-target2">5 Sastera</td><td class="p-2 md:p-3 highlight-target2">Cikgu Kamal</td></tr>
                                        </tbody>
                                    </table>
                                </div>

                                <!-- Normalized View -->
                                <div id="normalized-view" class="hidden flex flex-col xl:flex-row gap-6 mt-4 opacity-0 transition-opacity duration-700">
                                    <div class="flex-1 overflow-x-auto">
                                        <h4 class="font-semibold text-blue-400 mb-2 text-sm">Jadual Pelajar</h4>
                                        <table class="w-full text-left border-collapse border border-blue-800 bg-slate-900 rounded-lg overflow-hidden min-w-[300px]">
                                            <thead class="bg-blue-900/50 text-white text-xs">
                                                <tr>
                                                    <th class="p-2 border-b border-blue-800">ID</th>
                                                    <th class="p-2 border-b border-blue-800">Nama</th>
                                                    <th class="p-2 border-b border-blue-800 text-blue-300">ID Kelas (FK)</th>
                                                </tr>
                                            </thead>
                                            <tbody class="text-slate-300 text-xs">
                                                <tr><td class="p-2 border-b border-slate-700">P001</td><td class="p-2 border-b border-slate-700">Ahmad</td><td class="p-2 border-b border-slate-700 font-bold text-blue-400">K01</td></tr>
                                                <tr><td class="p-2 border-b border-slate-700">P002</td><td class="p-2 border-b border-slate-700">Siti</td><td class="p-2 border-b border-slate-700 font-bold text-blue-400">K01</td></tr>
                                                <tr><td class="p-2 border-b border-slate-700">P003</td><td class="p-2 border-b border-slate-700">Muthu</td><td class="p-2 border-b border-slate-700 font-bold text-blue-400">K02</td></tr>
                                                <tr><td class="p-2">P004</td><td class="p-2">Wong</td><td class="p-2 font-bold text-blue-400">K02</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    <div class="flex items-center justify-center text-slate-500 py-2 xl:py-0">
                                        <i class="fas fa-link text-2xl xl:rotate-0 rotate-90"></i>
                                    </div>

                                    <div class="flex-1 overflow-x-auto">
                                        <h4 class="font-semibold text-emerald-400 mb-2 text-sm">Jadual Kelas</h4>
                                        <table class="w-full text-left border-collapse border border-emerald-800 bg-slate-900 rounded-lg overflow-hidden min-w-[300px]">
                                            <thead class="bg-emerald-900/50 text-white text-xs">
                                                <tr>
                                                    <th class="p-2 border-b border-emerald-800 text-emerald-300">ID Kelas (PK)</th>
                                                    <th class="p-2 border-b border-emerald-800">Nama Kelas</th>
                                                    <th class="p-2 border-b border-emerald-800">Guru Kelas</th>
                                                </tr>
                                            </thead>
                                            <tbody class="text-slate-300 text-xs">
                                                <tr><td class="p-2 border-b border-slate-700 font-bold text-emerald-400">K01</td><td class="p-2 border-b border-slate-700">5 Sains</td><td class="p-2 border-b border-slate-700 bg-emerald-900/30">Cikgu Aminah</td></tr>
                                                <tr><td class="p-2 font-bold text-emerald-400">K02</td><td class="p-2">5 Sastera</td><td class="p-2 bg-emerald-900/30">Cikgu Kamal</td></tr>
                                            </tbody>
                                        </table>
                                        <p class="text-xs text-slate-400 mt-3 italic">* Cikgu Aminah/Kamal hanya direkod 1 KALI. Selesai!</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul2':
                    if(!state.m2_done) { addXP(100); state.m2_done = true; }
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-orange-500/20 text-orange-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">2.1.2</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Model Pangkalan Data</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 md:mb-8 text-sm md:text-lg">Membezakan model Hierarki, Rangkaian, Hubungan, dan Objek.</p>

                            <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden flex flex-col md:flex-row">
                                <!-- Tabs -->
                                <div class="md:w-1/3 flex flex-row md:flex-col overflow-x-auto bg-slate-800/50 border-b md:border-b-0 md:border-r border-slate-700">
                                    <button onclick="showModel('hierarki', this)" class="model-tab whitespace-nowrap text-left p-4 bg-slate-900 font-semibold text-blue-400 border-b-4 md:border-b-0 md:border-l-4 border-blue-500 transition-colors text-sm">
                                        <i class="fas fa-sitemap w-5 md:w-6 text-center"></i> Hierarki
                                    </button>
                                    <button onclick="showModel('rangkaian', this)" class="model-tab whitespace-nowrap text-left p-4 text-slate-400 hover:bg-slate-700 transition-colors border-b-4 md:border-b-0 md:border-l-4 border-transparent text-sm">
                                        <i class="fas fa-project-diagram w-5 md:w-6 text-center"></i> Rangkaian
                                    </button>
                                    <button onclick="showModel('hubungan', this)" class="model-tab whitespace-nowrap text-left p-4 text-slate-400 hover:bg-slate-700 transition-colors border-b-4 md:border-b-0 md:border-l-4 border-transparent text-sm">
                                        <i class="fas fa-table w-5 md:w-6 text-center"></i> Hubungan
                                    </button>
                                    <button onclick="showModel('objek', this)" class="model-tab whitespace-nowrap text-left p-4 text-slate-400 hover:bg-slate-700 transition-colors border-b-4 md:border-b-0 md:border-l-4 border-transparent text-sm">
                                        <i class="fas fa-cubes w-5 md:w-6 text-center"></i> Objek
                                    </button>
                                </div>

                                <!-- Content -->
                                <div class="md:w-2/3 p-5 md:p-8 bg-slate-900 relative min-h-[450px]">
                                    <!-- Model Hierarki -->
                                    <div id="model-hierarki" class="model-content animate-fade-in">
                                        <h3 class="text-xl md:text-2xl font-bold text-white mb-2">Model Hierarki</h3>
                                        <p class="text-slate-400 mb-6 text-sm">Menyusun data seperti pokok (tree). Hubungan <strong>Satu-ke-Banyak (1:M)</strong> sahaja.</p>
                                        
                                        <div class="flex justify-center mb-6 bg-slate-800 p-4 md:p-6 rounded-lg border border-slate-700 overflow-x-auto">
                                            <svg width="200" height="150" viewBox="0 0 200 150" class="flex-shrink-0">
                                                <rect x="75" y="10" width="50" height="30" rx="5" fill="#3b82f6"/>
                                                <text x="100" y="30" fill="white" font-size="12" text-anchor="middle">Syarikat</text>
                                                <path d="M 100 40 L 100 60 L 40 60 L 40 80" fill="none" stroke="#94a3b8" stroke-width="2"/>
                                                <path d="M 100 40 L 100 60 L 160 60 L 160 80" fill="none" stroke="#94a3b8" stroke-width="2"/>
                                                <rect x="15" y="80" width="50" height="30" rx="5" fill="#10b981"/>
                                                <text x="40" y="100" fill="white" font-size="12" text-anchor="middle">Kewangan</text>

                                                <label class="flex items-start gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer"><input type="radio" name="uq13" value="B" class="mt-1"><span class="text-slate-300 text-sm md:text-base">1:M</span></label>
                                                <label class="flex items-start gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer"><input type="radio" name="uq13" value="C" class="mt-1"><span class="text-slate-300 text-sm md:text-base">M:N</span></label>
                                            </div>
                                        </div>
                                        <div>
                                            <p class="font-semibold text-slate-200 mb-3 text-sm md:text-base">14. Model data yang simpan data beserta method/behavior?</p>
                                            <div class="space-y-2">
                                                <label class="flex items-start gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer"><input type="radio" name="uq14" value="A" class="mt-1"><span class="text-slate-300 text-sm md:text-base">Model Hierarki</span></label>
                                                <label class="flex items-start gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer"><input type="radio" name="uq14" value="C" class="mt-1"><span class="text-slate-300 text-sm md:text-base">Model Objek</span></label>
                                            </div>
                                        </div>
                                        <div>
                                            <p class="font-semibold text-slate-200 mb-3 text-sm md:text-base">15. Kesan terburuk jika integriti bank gagal?</p>
                                            <div class="space-y-2">
                                                <label class="flex items-start gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer"><input type="radio" name="uq15" value="A" class="mt-1"><span class="text-slate-300 text-sm md:text-base">Maklumat baki akaun silap</span></label>
                                                <label class="flex items-start gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer"><input type="radio" name="uq15" value="B" class="mt-1"><span class="text-slate-300 text-sm md:text-base">Komputer kena virus</span></label>
                                            </div>
                                        </div>
                                    </div>

                                    <button onclick="checkUjian()" class="w-full mt-10 bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-orange-900/20 transform transition hover:-translate-y-1">Hantar Jawapan</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
            }

            container.innerHTML = html;
        }

        // --- Evaluators ---
        function highlightRedundancy() {
            const targets = document.querySelectorAll('.highlight-target');
            const targets2 = document.querySelectorAll('.highlight-target2');
            
            targets.forEach(el => el.classList.add('highlight-red'));
            targets2.forEach(el => el.classList.add('highlight-orange'));
            
            setTimeout(() => { showToast("Pemerhatian", "Perhatikan data berulang. Ini KELEWAHAN.", "error"); }, 500);
        }

        function normalizeTable() {
            document.getElementById('unnormalized-view').classList.add('hidden');
            const normView = document.getElementById('normalized-view');
            normView.classList.remove('hidden');
            
            setTimeout(() => {
                normView.classList.remove('opacity-0');
                normView.classList.add('opacity-100');
                showToast("Berjaya!", "Penormalan telah memisahkan jadual.");
            }, 50);
        }

        function resetTable() {
            const targets = document.querySelectorAll('.highlight-target');
            const targets2 = document.querySelectorAll('.highlight-target2');
            
            targets.forEach(el => el.classList.remove('highlight-red'));
            targets2.forEach(el => el.classList.remove('highlight-orange'));

            const normView = document.getElementById('normalized-view');
            normView.classList.remove('opacity-100');
            normView.classList.add('opacity-0');
            
            setTimeout(() => {
                normView.classList.add('hidden');
                document.getElementById('unnormalized-view').classList.remove('hidden');
            }, 300);
        }

        function showModel(modelId, btnElement) {
            document.querySelectorAll('.model-content').forEach(el => el.classList.add('hidden'));
            
            document.querySelectorAll('.model-tab').forEach(tab => {
                tab.classList.remove('bg-slate-900', 'font-semibold', 'text-blue-400', 'border-l-blue-500', 'border-b-blue-500');
                tab.classList.add('text-slate-400', 'border-transparent');
            });

            document.getElementById('model-' + modelId).classList.remove('hidden');
            
            btnElement.classList.remove('text-slate-400', 'border-transparent');
            btnElement.classList.add('bg-slate-900', 'font-semibold', 'text-blue-400');
            
            if(window.innerWidth < 768) {
                btnElement.classList.add('border-b-blue-500');
            } else {
                btnElement.classList.add('border-l-blue-500');
            }
        }

        function setCardinality(type) {
            document.querySelectorAll('.card-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-700', 'text-slate-300');
            });

            const activeBtn = document.getElementById('btn-' + type);
            activeBtn.classList.remove('bg-slate-700', 'text-slate-300');
            activeBtn.classList.add('bg-blue-600', 'text-white');

            const ent1 = document.getElementById('ent1-name');
            const ent2 = document.getElementById('ent2-name');
            const rel = document.getElementById('rel-name');
            const cardLeft = document.getElementById('card-left');
            const cardRight = document.getElementById('card-right');
            const desc = document.getElementById('card-desc');

            if(type === '1to1') {
                ent1.innerText = 'Pengetua'; ent2.innerText = 'Sekolah'; rel.innerText = 'Urus';
                cardLeft.innerText = '1'; cardRight.innerText = '1';
                desc.innerHTML = '1 Pengetua urus 1 Sekolah.';
            } 
            else if(type === '1toM') {
                ent1.innerText = 'Guru'; ent2.innerText = 'Pelajar'; rel.innerText = 'Ajar';
                cardLeft.innerText = '1'; cardRight.innerText = 'M';
                desc.innerHTML = '1 Guru ajar Ramai Pelajar.';
            }
            else if(type === 'MtoN') {
                ent1.innerText = 'Pelajar'; ent2.innerText = 'Subjek'; rel.innerText = 'Ambil';
                cardLeft.innerText = 'M'; cardRight.innerText = 'N';
                desc.innerHTML = 'Ramai Pelajar ambil Pelbagai Subjek.';
            }
        }

        function checkUjian() {
            const answers = { uq1: 'B', uq2: 'C', uq3: 'C', uq4: 'B', uq5: 'C', uq6: 'A', uq7: 'C', uq8: 'C', uq9: 'A', uq10: 'A', uq11: 'B', uq12: 'A', uq13: 'B', uq14: 'C', uq15: 'A' };
            let allAnswered = true, allCorrect = true;

            for (let i = 1; i <= 15; i++) {
                const q = document.querySelector(`input[name="uq${i}"]:checked`);
                if (!q) { allAnswered = false; break; }
                if (q.value !== answers[`uq${i}`]) { allCorrect = false; }
            }

            if (!allAnswered) {
                showToast("Perhatian", "Sila jawab kesemua 15 soalan.", "error"); return;
            }

            if (allCorrect) {
                if(!state.ujian_done) { addXP(1000); state.ujian_done = true; }
                document.getElementById('content-area').innerHTML = `
                    <div class="animate-fade-in text-center pt-10 md:pt-20 pb-20">
                        <i class="fas fa-medal text-7xl md:text-9xl text-orange-400 mb-8 drop-shadow-[0_0_30px_rgba(249,115,22,0.5)]"></i>
                        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Tahniah! Anda Lulus.</h1>
                        <p class="text-sm md:text-xl text-slate-300 max-w-2xl mx-auto px-4">Anda telah menguasai asas Pangkalan Data Hubungan.</p>
                        <p class="mt-8 text-xl md:text-2xl font-bold text-orange-400">Total XP: ${currentXP}</p>
                        <div class="mt-12">
                            <a href="index.html" class="inline-block bg-orange-600 hover:bg-orange-500 text-white px-6 md:px-8 py-3 md:py-4 rounded-xl font-bold text-sm md:text-lg transition-colors shadow-lg shadow-orange-900/50">
                                <i class="fas fa-home mr-2"></i> Kembali ke Portal Utama
                            </a>
                        </div>
                    </div>
                `;
                window.scrollTo(0, 0);
            } else {
                showToast("Gagal", "Terdapat jawapan yang salah. Sila cuba lagi.", "error");
            }
        }

        window.onload = () => { loadModule('modul1'); };
    </script>
</body>
</html>

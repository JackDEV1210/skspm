<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pembelajaran: Sains Komputer KSSM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0; /* Slate 200 */
        }
        
        /* Custom Scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .nav-item.active {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden selection:bg-blue-500 selection:text-white bg-slate-900">

    <!-- Mobile Header -->
    <div class="md:hidden bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-30">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
            <i class="fas fa-laptop-code text-blue-400"></i> Portal SK KSSM
        </h1>
        <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/80 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-50 w-72 bg-slate-800 border-r border-slate-700 flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-700 hidden md:block">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-laptop-code text-blue-400"></i>
                Portal SK KSSM
            </h1>
            <p class="text-xs text-slate-400 mt-2">Silibus Tingkatan 4 & 5</p>
        </div>
        
        <div class="p-4 md:hidden flex justify-between items-center border-b border-slate-700">
            <span class="text-white font-bold text-lg">Menu Navigasi</span>
            <button id="close-sidebar-btn" class="text-slate-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-300">Pengalaman (XP)</span>
                <span id="xp-counter" class="text-sm font-bold text-yellow-400">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5">
                <div id="xp-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <button onclick="loadModule('intro')" id="nav-intro" class="nav-item w-full flex items-center gap-3 px-4 py-3 mb-4 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors active">
                <i class="fas fa-home w-5 text-center"></i>
                <span class="font-bold">Menu Utama</span>
            </button>

            <div class="pt-2 pb-2 px-4 text-xs font-semibold text-blue-400 uppercase tracking-wider">Tingkatan 4</div>
            <button onclick="loadModule('t4_bab1')" id="nav-t4_bab1" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-code w-5 text-center"></i>
                <span class="text-sm md:text-base">1.0 Pengaturcaraan</span>
            </button>
            <button onclick="loadModule('t4_bab2')" id="nav-t4_bab2" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-database w-5 text-center"></i>
                <span class="text-sm md:text-base">2.0 Pangkalan Data</span>
            </button>
            <button onclick="loadModule('t4_bab3')" id="nav-t4_bab3" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-desktop w-5 text-center"></i>
                <span class="text-sm md:text-base">3.0 Interaksi Komputer</span>
            </button>

            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-green-400 uppercase tracking-wider">Tingkatan 5</div>
            <button disabled title="Akan Datang" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-500 bg-slate-800/30 cursor-not-allowed">
                <i class="fas fa-lock w-5 text-center opacity-50"></i>
                <span class="text-sm md:text-base">1.0 Pengkomputeran</span>
            </button>
            <button disabled title="Akan Datang" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-500 bg-slate-800/30 cursor-not-allowed">
                <i class="fas fa-lock w-5 text-center opacity-50"></i>
                <span class="text-sm md:text-base">2.0 DB Lanjutan</span>
            </button>
            <button disabled title="Akan Datang" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-500 bg-slate-800/30 cursor-not-allowed">
                <i class="fas fa-lock w-5 text-center opacity-50"></i>
                <span class="text-sm md:text-base">3.0 Pengaturcaraan Web</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-y-auto h-full">
        <div id="content-area" class="max-w-6xl mx-auto p-4 md:p-8 pb-24 md:pb-20">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeBtn = document.getElementById(`nav-${moduleId}`);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function loadModule(moduleId) {
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            const container = document.getElementById('content-area');
            updateNavActive(moduleId);
            window.scrollTo(0, 0);
            
            let html = '';

            switch (moduleId) {
                case 'intro':
                    html = `
                        <div class="animate-fade-in">
                            <div class="bg-gradient-to-r from-blue-900 to-slate-800 rounded-2xl p-6 md:p-8 border border-blue-800/50 shadow-lg mb-8 md:mb-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                <div>
                                    <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">Selamat Datang, Pengatur Cara!</h1>
                                    <p class="text-blue-200">Pilih topik Tingkatan 4 atau Tingkatan 5 di bawah untuk mula meneroka.</p>
                                </div>
                            </div>

                            <div class="mb-4 mt-8">
                                <h2 class="text-2xl font-bold text-white flex items-center gap-3 mb-2">
                                    <i class="fas fa-book text-blue-500"></i> Silibus Tingkatan 4
                                </h2>
                                <p class="text-sm text-slate-400 mb-6">Modul asas Sains Komputer berdasarkan DSKP KSSM Tingkatan 4.</p>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 mb-10">
                                <!-- T4: Pengaturcaraan -->
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 relative">
                                    <div class="bg-blue-500/20 w-12 h-12 flex items-center justify-center rounded-lg mb-4">
                                        <i class="fas fa-code text-blue-400 text-xl"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-white mb-3">1.0 Pengaturcaraan</h3>
                                    <ul class="text-slate-400 text-sm space-y-3">
                                        <li><a href="1.1.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.1 Strategi Penyelesaian</a></li>
                                        <li><a href="1.2.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.2 Algoritma</a></li>
                                        <li><a href="1.3.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.3 Pemboleh Ubah & Data</a></li>
                                        <li><a href="1.4.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.4 Struktur Kawalan</a></li>
                                        <li><a href="1.5.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.5 Amalan Terbaik</a></li>
                                        <li><a href="1.6.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.6 Struktur Data & Modular</a></li>
                                        <li><a href="1.7.html" class="flex items-center text-blue-300 font-bold bg-blue-900/40 p-2 -ml-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>1.7 Pembangunan Aplikasi</a></li>
                                    </ul>
                                </div>

                                <!-- T4: Pangkalan Data -->
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 relative">
                                    <div class="bg-orange-500/20 w-12 h-12 flex items-center justify-center rounded-lg mb-4">
                                        <i class="fas fa-database text-orange-400 text-xl"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-white mb-3">2.0 Pangkalan Data</h3>
                                    <ul class="text-slate-400 text-sm space-y-3">
                                        <li><a href="2.1.html" class="flex items-center text-orange-300 font-bold bg-orange-900/40 p-2 -ml-2 rounded-lg hover:bg-orange-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>2.1 DB Hubungan</a></li>
                                        <li><a href="2.2.html" class="flex items-center text-orange-300 font-bold bg-orange-900/40 p-2 -ml-2 rounded-lg hover:bg-orange-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>2.2 Reka Bentuk DB</a></li>
                                        <li><a href="2.3.html" class="flex items-center text-orange-300 font-bold bg-orange-900/40 p-2 -ml-2 rounded-lg hover:bg-orange-600 hover:text-white transition-all"><i class="fas fa-play-circle text-yellow-400 mr-2"></i>2.3 Pembangunan DB</a></li>
                                    </ul>
                                </div>

                                <!-- T4: Interaksi Manusia & Komputer -->
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 relative">
                                    <div class="bg-purple-500/20 w-12 h-12 flex items-center justify-center rounded-lg mb-4">
                                        <i class="fas fa-desktop text-purple-400 text-xl"></i>
                                    </div>
                                    <h3 class="text-xl font-bold text-white mb-3">3.0 Interaksi Komputer</h3>
                                    <ul class="text-slate-400 text-sm space-y-3">
                                        <li>
                                            <a href="3.1.html" class="flex items-center text-purple-300 font-bold bg-purple-900/40 p-2 -ml-2 rounded-lg hover:bg-purple-600 hover:text-white transition-all shadow-sm">
                                                <i class="fas fa-play-circle text-yellow-400 mr-2"></i>3.1 Reka Bentuk Interaksi
                                            </a>
                                        </li>
                                        <li>
                                            <a href="3.2.html" class="flex items-center text-purple-300 font-bold bg-purple-900/40 p-2 -ml-2 rounded-lg hover:bg-purple-600 hover:text-white transition-all shadow-sm border border-purple-500/30">
                                                <i class="fas fa-play-circle text-yellow-400 mr-2"></i>3.2 Paparan & Reka Bentuk Skrin
                                            </a>
                                        </li>
                                    </ul>
                                </div>
                            </div>

                            <!-- TINGKATAN 5 -->
                            <div class="mb-4 mt-12 border-t border-slate-700 pt-8">
                                <h2 class="text-2xl font-bold text-white flex items-center gap-3 mb-2">
                                    <i class="fas fa-graduation-cap text-green-500"></i> Silibus Tingkatan 5
                                </h2>
                                <p class="text-sm text-slate-400 mb-6">Modul lanjutan Sains Komputer.</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
                                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 opacity-60 cursor-not-allowed flex flex-col items-center justify-center text-center">
                                    <i class="fas fa-lock text-2xl text-slate-500 mb-2"></i>
                                    <h3 class="font-bold text-white">1.0 Pengkomputeran</h3>
                                </div>
                                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 opacity-60 cursor-not-allowed flex flex-col items-center justify-center text-center">
                                    <i class="fas fa-lock text-2xl text-slate-500 mb-2"></i>
                                    <h3 class="font-bold text-white">2.0 DB Lanjutan</h3>
                                </div>
                                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 opacity-60 cursor-not-allowed flex flex-col items-center justify-center text-center">
                                    <i class="fas fa-lock text-2xl text-slate-500 mb-2"></i>
                                    <h3 class="font-bold text-white">3.0 Pengaturcaraan Web</h3>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                
                default:
                    html = `<div class="text-white text-center mt-20"><i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i><br>Sila pilih modul dari menu utama.</div>`;
            }

            container.innerHTML = html;
        }

        window.onload = () => {
            loadModule('intro');
        };
    </script>
</body>
</html>

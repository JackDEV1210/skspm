    <script>
        // --- State Management ---
        let currentXP = 0;
        const state = {
            m1_q1_done: false,
            m2_q1_done: false,
            m2_q2_done: false,
            m3_q1_done: false,
            m4_q1_done: false,
            ujian_done: false

        // --- Sidebar Logic (Mobile) ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('backdrop');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                backdrop.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        function closeSidebar() {
            if (window.innerWidth < 768) { // Only close automatically on mobile
                const sidebar = document.getElementById('sidebar');
                const backdrop = document.getElementById('backdrop');
                sidebar.classList.add('-translate-x-full');
                backdrop.classList.add('hidden');
            }
        }

        // --- Utility Functions ---
        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1000) currentXP = 1000;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1000`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1000) * 100}%`;
            
            // Highlight animation
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-110', 'md:scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-110', 'md:scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl md:text-2xl shrink-0';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl md:text-2xl shrink-0';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-[120%]');
            setTimeout(() => {
                toast.classList.add('translate-x-[120%]');
            }, 3500);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${moduleId}`).classList.add('active');

            const q2 = document.querySelector('input[name="uq2"]:checked');

            if (!q1 || !q2) {
                showToast("Perhatian", "Sila jawab semua soalan sebelum hantar.", "error");
                return;
            }

            if (q1.value === 'B' && q2.value === 'C') {
                if(!state.ujian_done) { addXP(300); state.ujian_done = true; }
                
                document.getElementById('content-area').innerHTML = `
                    <div class="animate-fade-in text-center pt-10 md:pt-20 px-4">
                        <i class="fas fa-medal text-8xl md:text-9xl text-yellow-400 mb-6 md:mb-8 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]"></i>
                        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Tahniah! Anda telah Lulus.</h1>
                        <p class="text-base md:text-xl text-slate-300 max-w-2xl mx-auto leading-relaxed">Anda kini menguasai asas Ralat, Penyahpepijatan, Penjejakan Nilai dan Gaya Kod Bersih mengikut Standard 1.5. Teruskan latihan pengekodan anda!</p>
                        <div class="mt-8 inline-block bg-slate-800 border border-yellow-500/30 px-8 py-4 rounded-xl">
                            <p class="text-sm text-slate-400 uppercase tracking-widest mb-1">Jumlah Keseluruhan</p>
                            <p class="text-3xl font-bold text-yellow-400">${currentXP} XP</p>
                        </div>
                        <div class="mt-10">
                            <button onclick="loadModule('intro')" class="bg-slate-700 hover:bg-slate-600 text-white px-8 py-3 rounded-lg font-semibold transition-colors shadow-lg">Kembali ke Menu Utama</button>
                        </div>
                    </div>
                `;
            } else {
                showToast("Gagal", "Terdapat jawapan yang salah. Sila semak semula nota di Modul 1 dan Modul 4.", "error");
            }
        }

        // Initialize App
        window.onload = () => {
            loadModule('intro');
        };
    </script>
</body>
</html>

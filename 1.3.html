<!DOCTYPE html>
<html lang="ms">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;

            font-family: 'Fira Code', monospace;
        }

        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

            background-color: #3b82f6;
            color: white;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden selection:bg-blue-500 selection:text-white bg-slate-900">

    <!-- Mobile Header -->
    <div class="md:hidden bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-30">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
            <i class="fas fa-cube text-blue-400"></i> Akademi Kod (1.3)
        </h1>
        <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/80 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-50 w-72 bg-slate-800 border-r border-slate-700 flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-700 hidden md:block">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-cube text-blue-400"></i>
                Akademi Kod
            </h1>
            <p class="text-xs text-slate-400 mt-2">Sains Komputer - Topik 1.3</p>
        </div>
        
        <div class="p-4 md:hidden flex justify-between items-center border-b border-slate-700">
            <span class="text-white font-bold text-lg">Menu Navigasi</span>
            <button id="close-sidebar-btn" class="text-slate-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-300">Pengalaman (XP)</span>
                <span id="xp-counter" class="text-sm font-bold text-yellow-400">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5">
                <div id="xp-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 mb-4 rounded-lg text-left text-white bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600 shadow-md">
                <i class="fas fa-arrow-left w-5 text-center text-rose-400"></i>
                <span class="font-bold">Kembali ke Portal</span>
            </a>

            <div class="pt-2 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Modul Pembelajaran</div>
            <button onclick="loadModule('modul1')" id="nav-modul1" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-database w-5 text-center text-blue-400"></i>
                <span class="text-sm md:text-base">M1: Jenis Data</span>
            </button>
            <button onclick="loadModule('modul2')" id="nav-modul2" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-map-marker-alt w-5 text-center text-orange-400"></i>
                <span class="text-sm md:text-base">M2: Pemboleh Ubah</span>
            </button>
            <button onclick="loadModule('modul3')" id="nav-modul3" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-calculator w-5 text-center text-green-400"></i>
                <span class="text-sm md:text-base">M3: Aritmetik</span>
            </button>
            <button onclick="loadModule('modul4')" id="nav-modul4" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-keyboard w-5 text-center text-purple-400"></i>
                <span class="text-sm md:text-base">M4: Input/Output</span>
            </button>
            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Penilaian</div>
            <button onclick="loadModule('ujian')" id="nav-ujian" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-trophy w-5 text-center text-yellow-400"></i>
                <span class="text-sm md:text-base">Ujian Akhir (Boss)</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-y-auto h-full">
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-5 right-5 z-50 transform transition-transform duration-300 translate-x-full bg-slate-800 border border-slate-600 px-4 py-3 md:px-6 md:py-4 rounded-lg shadow-xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400 text-lg md:text-xl"></i>
            <div>
                <h4 id="toast-title" class="font-bold text-white text-sm md:text-base">Berjaya!</h4>
                <p id="toast-msg" class="text-xs md:text-sm text-slate-300">Jawapan anda tepat. +50 XP</p>
            </div>
        </div>

        <div id="content-area" class="max-w-5xl mx-auto p-4 md:p-8 pb-24 md:pb-20">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        // --- Mobile Menu Logic ---
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        // --- State Management ---
        let currentXP = 0;
        const state = {
            m1_done: false, m2_done: false, m3_done: false, m4_done: false, ujian_done: false
        };

        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => { toast.classList.add('translate-x-full'); }, 3000);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${moduleId}`);
            if(activeNav) activeNav.classList.add('active');
        }

        function loadModule(moduleId) {
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            const container = document.getElementById('content-area');
            updateNavActive(moduleId);
            window.scrollTo(0, 0);
            
            let html = '';

            switch (moduleId) {
                case 'modul1':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-blue-500/20 text-blue-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.3.1 & 1.3.2</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Jenis Data & Kapasiti Ingatan</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 text-sm md:text-lg">Komputer perlu tahu <strong>jenis data</strong> yang dimasukkan untuk memperuntukkan <strong>saiz ingatan (memori)</strong> yang betul dan mengelakkan pembaziran RAM.</p>

                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 md:mb-10">
                                <!-- Integer -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:-translate-y-1 transition-transform">
                                    <div class="text-blue-400 font-bold mb-2 code-font text-lg">int</div>
                                    <h3 class="font-bold text-white text-sm mb-1">Integer (Nombor Bulat)</h3>
                                    <p class="text-xs text-slate-400 mb-3">Contoh: 14, -5, 2024</p>
                                    <div class="bg-slate-900 rounded p-2 text-xs text-center border border-slate-700">
                                        <span class="text-slate-500">Saiz:</span> <span class="font-bold text-blue-300">4 bytes</span>
                                    </div>
                                </div>
                                <!-- Float/Double -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:-translate-y-1 transition-transform">
                                    <div class="text-emerald-400 font-bold mb-2 code-font text-lg">double</div>
                                    <h3 class="font-bold text-white text-sm mb-1">Nombor Nyata (Perpuluhan)</h3>
                                    <p class="text-xs text-slate-400 mb-3">Contoh: 3.14, 99.9</p>
                                    <div class="bg-slate-900 rounded p-2 text-xs text-center border border-slate-700">
                                        <span class="text-slate-500">Saiz:</span> <span class="font-bold text-emerald-300">8 bytes</span>
                                    </div>
                                </div>
                                <!-- String -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:-translate-y-1 transition-transform">
                                    <div class="text-purple-400 font-bold mb-2 code-font text-lg">String / char</div>
                                    <h3 class="font-bold text-white text-sm mb-1">Teks / Aksara</h3>
                                    <p class="text-xs text-slate-400 mb-3">Contoh: 'A', "Teks"</p>
                                    <div class="bg-slate-900 rounded p-2 text-xs text-center border border-slate-700">
                                        <span class="text-slate-500">Saiz:</span> <span class="font-bold text-purple-300">Pelbagai</span>
                                    </div>
                                </div>
                                <!-- Boolean -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:-translate-y-1 transition-transform">
                                    <div class="text-orange-400 font-bold mb-2 code-font text-lg">boolean</div>
                                    <h3 class="font-bold text-white text-sm mb-1">Nilai Logik</h3>
                                    <p class="text-xs text-slate-400 mb-3">Contoh: true, false</p>
                                    <div class="bg-slate-900 rounded p-2 text-xs text-center border border-slate-700">
                                        <span class="text-slate-500">Saiz:</span> <span class="font-bold text-orange-300">1 bit</span>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-4"><i class="fas fa-dumbbell mr-2 text-blue-400"></i>Cabaran Kefahaman</h3>
                                <p class="text-sm text-slate-300 mb-4">Anda membina sistem e-dagang. Jenis data apakah yang paling efisien untuk menyimpan maklumat <strong>"Harga Barang (RM 14.50)"</strong>?</p>
                                
                                <div class="grid grid-cols-2 md:flex md:flex-wrap gap-2 md:gap-3">
                                    <button onclick="checkM1('int')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded p-3 font-mono transition-colors text-sm">int</button>
                                    <button onclick="checkM1('double')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded p-3 font-mono transition-colors text-sm">double</button>
                                    <button onclick="checkM1('String')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded p-3 font-mono transition-colors text-sm">String</button>
                                    <button onclick="checkM1('boolean')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded p-3 font-mono transition-colors text-sm">boolean</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul2':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-orange-500/20 text-orange-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.3.3 & 1.3.4</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Pemboleh Ubah & Pemalar</h2>
                            </div>
                            
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 mb-8">
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6">
                                    <h3 class="font-bold text-white text-base md:text-lg mb-3 border-b border-slate-700 pb-2"><i class="fas fa-globe text-blue-400 mr-2"></i>Skop Pemboleh Ubah</h3>
                                    <ul class="text-sm text-slate-300 space-y-4">
                                        <li>
                                            <span class="font-bold text-blue-300 block mb-1">Sejagat (Global)</span>
                                            Diisytiharkan di luar fungsi. Boleh diakses di seluruh atur cara.
                                        </li>
                                        <li>
                                            <span class="font-bold text-orange-300 block mb-1">Setempat (Local)</span>
                                            Diisytiharkan di dalam fungsi. Hayatnya tamat bila blok fungsi tamat.
                                        </li>
                                    </ul>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6">
                                    <h3 class="font-bold text-white text-base md:text-lg mb-3 border-b border-slate-700 pb-2"><i class="fas fa-box-open text-emerald-400 mr-2"></i>Sintaks</h3>
                                    <div class="bg-slate-900 rounded p-3 text-xs md:text-sm code-font text-slate-400 mb-3 overflow-x-auto">
                                        <span class="text-slate-500">// Pengisytiharan</span><br>
                                        <span class="text-blue-400">int</span> markah;<br><br>
                                        <span class="text-slate-500">// Umpukan Nilai</span><br>
                                        markah = <span class="text-orange-400">80</span>;<br><br>
                                        <span class="text-slate-500">// PEMALAR (Statik)</span><br>
                                        <span class="text-emerald-400">final double</span> PI = <span class="text-orange-400">3.14</span>;
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                                <div class="bg-slate-700/50 p-4 border-b border-slate-700">
                                    <h3 class="font-bold text-white">Latihan Skop (Scope)</h3>
                                </div>
                                <div class="p-4 md:p-6">
                                    <p class="text-sm text-slate-300 mb-4">Adakah baris ke-6 (print) akan menghasilkan ralat?</p>
                                    
                                    <div class="bg-slate-900 rounded p-4 text-xs md:text-sm code-font text-slate-300 mb-6 shadow-inner overflow-x-auto whitespace-pre">
<span class="text-slate-500 mr-3">1</span><span class="text-blue-400">void</span> kiraBonus() {
<span class="text-slate-500 mr-3">2</span>    <span class="text-blue-400">int</span> <span class="text-orange-300">bonus</span> = <span class="text-emerald-300">500</span>;
<span class="text-slate-500 mr-3">3</span>}
<span class="text-slate-500 mr-3">4</span>
<span class="text-slate-500 mr-3">5</span><span class="text-blue-400">void</span> paparPaparan() {
<span class="text-slate-500 mr-3">6</span>    print(<span class="text-orange-300">bonus</span>);
<span class="text-slate-500 mr-3">7</span>}</div>
                                    
                                    <div class="flex flex-col md:flex-row gap-3">
                                        <button onclick="checkM2('ralat')" class="bg-rose-600 hover:bg-rose-700 text-white px-6 py-3 md:py-2 rounded-lg font-semibold transition-colors text-sm">Ya, Akan Ralat</button>
                                        <button onclick="checkM2('ok')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 md:py-2 rounded-lg font-semibold transition-colors text-sm">Tidak, Berjalan Lancar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul3':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-green-500/20 text-green-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.3.5</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Umpukan & Aritmetik</h2>
                            </div>
                            
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 mb-8 md:mb-10">
                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700">
                                    <h3 class="text-lg md:text-xl font-bold text-white mb-2">Penyataan Umpukan (=)</h3>
                                    <p class="text-slate-400 text-sm mb-4">Simbol <code class="bg-slate-900 px-1 rounded text-orange-300">=</code> bermaksud <strong>mengumpukkan</strong> nilai dari kanan ke dalam memori di kiri.</p>
                                    <div class="bg-slate-900 p-3 rounded code-font text-xs md:text-sm text-slate-300 border border-slate-700 overflow-x-auto">
                                        x = 10;<br>
                                        x = x + 5; <span class="text-slate-500">// x kini 15</span>
                                    </div>
                                </div>

                                <div class="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700">
                                    <h3 class="text-lg md:text-xl font-bold text-white mb-2">Operator Aritmetik</h3>
                                    <ul class="text-slate-400 text-sm space-y-2">
                                        <li><code class="text-green-400 font-bold w-6 inline-block">+</code> Tambah</li>
                                        <li><code class="text-green-400 font-bold w-6 inline-block">-</code> Tolak</li>
                                        <li><code class="text-green-400 font-bold w-6 inline-block">*</code> Darab</li>
                                        <li><code class="text-green-400 font-bold w-6 inline-block">/</code> Bahagi</li>
                                        <li><code class="text-rose-400 font-bold w-6 inline-block">%</code> <strong>Modulus (Baki)</strong></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6 text-center">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-4">Uji Minda: Modulus</h3>
                                <p class="text-sm text-slate-300 mb-6">Operasi modulus <code class="text-rose-400">%</code> memulangkan baki. Berapakah nilai pemboleh ubah <code class="bg-slate-900 text-blue-300 px-2 rounded">baki</code>?</p>
                                
                                <div class="bg-slate-900 rounded p-3 md:p-4 code-font text-base md:text-lg text-slate-300 inline-block mb-6 border border-slate-700">
                                    <span class="text-blue-400">int</span> baki = <span class="text-orange-400">10</span> % <span class="text-orange-400">3</span>;
                                </div>
                                
                                <div class="flex flex-col md:flex-row justify-center gap-3">
                                    <input type="number" id="m3-q1-input" class="bg-slate-700 border border-slate-600 text-white rounded px-4 py-3 md:w-32 focus:border-green-500 outline-none text-center font-bold text-xl" placeholder="?">
                                    <button onclick="checkM3()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg font-bold transition-colors">Semak</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul4':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-purple-500/20 text-purple-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.3.6</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Input & Output</h2>
                            </div>
                            
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 mb-8">
                                <div class="bg-slate-800 border border-slate-700 p-5 md:p-6 rounded-xl relative overflow-hidden">
                                    <div class="absolute top-0 right-0 opacity-10 m-2 md:m-4"><i class="fas fa-keyboard text-5xl md:text-6xl"></i></div>
                                    <h3 class="font-bold text-white text-lg md:text-xl mb-3 border-b border-slate-700 pb-2 relative z-10">Menerima Input</h3>
                                    <div class="bg-slate-900 rounded p-3 text-xs md:text-sm code-font text-slate-300 relative z-10 overflow-x-auto whitespace-pre">
<span class="text-slate-500">// Java:</span>
Scanner input = new Scanner(System.in);
String <span class="text-purple-400">nama</span> = input.nextLine();

<span class="text-slate-500">// Python:</span>

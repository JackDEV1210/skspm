    <script>
        // --- State Management ---
        let currentXP = 0;
        const state = {
            m1_done: false,
            m2_done: false,
            m3_done: false,
            m4_done: false,
            ujian_done: false

        // --- Utility Functions ---
        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            // Highlight animation
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${moduleId}`);
            if(activeNav) activeNav.classList.add('active');
        }

                uq1: 'B', uq2: 'C', uq3: 'B', uq4: 'A', uq5: 'B',
                uq6: 'A', uq7: 'B', uq8: 'A', uq9: 'C', uq10: 'A',
                uq11: 'B', uq12: 'C', uq13: 'A', uq14: 'B', uq15: 'B'
            };

            let allAnswered = true;
            let allCorrect = true;

            for (let i = 1; i <= 15; i++) {
                const q = document.querySelector(`input[name="uq${i}"]:checked`);
                if (!q) {
                    allAnswered = false;
                    break;
                }
                if (q.value !== answers[`uq${i}`]) {
                    allCorrect = false;
                }
            }

            if (!allAnswered) {
                showToast("Perhatian", "Sila jawab kesemua 15 soalan sebelum menekan butang hantar.", "error");
                return;
            }

            if (allCorrect) {
                if(!state.ujian_done) { 
                    addXP(1000); // Ganjaran besar untuk boss battle
                    state.ujian_done = true; 
                }
                
                document.getElementById('content-area').innerHTML = `
                    <div class="animate-fade-in text-center pt-20 pb-20">
                        <i class="fas fa-medal text-9xl text-yellow-400 mb-8 drop-shadow-[0_0_30px_rgba(250,204,21,0.5)]"></i>
                        <h1 class="text-4xl font-bold text-white mb-4">Tahniah! Anda Lulus Cemerlang.</h1>
                        <p class="text-xl text-slate-300 max-w-2xl mx-auto">Anda telah berjaya menjawab kesemua 15 soalan dengan tepat. Anda kini diiktiraf telah menguasai asas Pemboleh Ubah, Jenis Data, dan Input/Output!</p>
                        <p class="mt-8 text-2xl font-bold text-yellow-400">Total XP: ${currentXP}</p>
                        
                        <div class="mt-12">
                            <a href="index.html" class="inline-block bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold text-lg transition-colors shadow-lg shadow-blue-900/50 transform hover:-translate-y-1">
                                <i class="fas fa-home mr-2"></i> Kembali ke Portal Utama
                            </a>
                        </div>
                    </div>
                `;
                window.scrollTo(0, 0);
            } else {
                showToast("Gagal", "Terdapat jawapan yang salah. Sila semak semula nota modul dan cuba lagi.", "error");
            }
        }

        // Initialize App on load directly to Module 1
        window.onload = () => {
            loadModule('modul1');
        };
    </script>
</body>
</html>

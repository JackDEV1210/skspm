<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademi Pengekodan: Struktur Kawalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .nav-item.active {
            background-color: #3b82f6;
            color: white;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden selection:bg-blue-500 selection:text-white bg-slate-900">

    <!-- Mobile Header -->
    <div class="md:hidden bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-30">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
            <i class="fas fa-sitemap text-blue-400"></i> Akademi Kod (1.4)
        </h1>
        <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/80 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-50 w-72 bg-slate-800 border-r border-slate-700 flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-700 hidden md:block">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-sitemap text-blue-400"></i>
                Akademi Kod
            </h1>
            <p class="text-xs text-slate-400 mt-2">Sains Komputer - Topik 1.4</p>
        </div>
        
        <div class="p-4 md:hidden flex justify-between items-center border-b border-slate-700">
            <span class="text-white font-bold text-lg">Menu Navigasi</span>
            <button id="close-sidebar-btn" class="text-slate-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-300">Pengalaman (XP)</span>
                <span id="xp-counter" class="text-sm font-bold text-yellow-400">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5">
                <div id="xp-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 mb-4 rounded-lg text-left text-white bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600 shadow-md">
                <i class="fas fa-arrow-left w-5 text-center text-rose-400"></i>
                <span class="font-bold">Kembali ke Portal</span>
            </a>

            <div class="pt-2 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Modul Pembelajaran</div>
            <button onclick="loadModule('modul1')" id="nav-modul1" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-code-branch w-5 text-center text-blue-400"></i>
                <span class="text-sm md:text-base">M1: Pilihan</span>
            </button>
            <button onclick="loadModule('modul2')" id="nav-modul2" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-equals w-5 text-center text-orange-400"></i>
                <span class="text-sm md:text-base">M2: Operator</span>
            </button>
            <button onclick="loadModule('modul3')" id="nav-modul3" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-undo-alt w-5 text-center text-green-400"></i>
                <span class="text-sm md:text-base">M3: Ulangan</span>
            </button>
            <button onclick="loadModule('modul4')" id="nav-modul4" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-plus-circle w-5 text-center text-purple-400"></i>
                <span class="text-sm md:text-base">M4: Aplikasi</span>
            </button>
            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Penilaian</div>
            <button onclick="loadModule('ujian')" id="nav-ujian" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-trophy w-5 text-center text-yellow-400"></i>
                <span class="text-sm md:text-base">Ujian Akhir (Boss)</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-y-auto h-full">
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-5 right-5 z-50 transform transition-transform duration-300 translate-x-full bg-slate-800 border border-slate-600 px-4 py-3 md:px-6 md:py-4 rounded-lg shadow-xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400 text-lg md:text-xl"></i>
            <div>
                <h4 id="toast-title" class="font-bold text-white text-sm md:text-base">Berjaya!</h4>
                <p id="toast-msg" class="text-xs md:text-sm text-slate-300">Jawapan anda tepat. +50 XP</p>
            </div>
        </div>

        <div id="content-area" class="max-w-5xl mx-auto p-4 md:p-8 pb-24 md:pb-20">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        // --- Mobile Menu Logic ---
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        // --- State Management ---
        let currentXP = 0;
        const state = { m1_done: false, m2_done: false, m3_done: false, m4_done: false, ujian_done: false };

        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => { toast.classList.add('translate-x-full'); }, 3000);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`nav-${moduleId}`);
            if(activeNav) activeNav.classList.add('active');
        }

        function loadModule(moduleId) {
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            const container = document.getElementById('content-area');
            updateNavActive(moduleId);
            window.scrollTo(0, 0);
            
            let html = '';

            switch (moduleId) {
                case 'modul1':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-blue-500/20 text-blue-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.4.1</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Struktur Kawalan Pilihan</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 text-sm md:text-lg">Membenarkan atur cara membuat keputusan untuk melaksanakan blok kod tertentu berdasarkan syarat.</p>

                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 mb-8 md:mb-10">
                                <!-- If-Else -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden hover:-translate-y-1 transition-transform">
                                    <div class="bg-blue-900/50 p-4 border-b border-blue-500/30 flex items-center gap-2">
                                        <i class="fas fa-code-branch text-blue-400"></i>
                                        <h3 class="font-bold text-blue-100">1. if-else</h3>
                                    </div>
                                    <div class="p-4 md:p-5">
                                        <p class="text-xs md:text-sm text-slate-300 mb-4">Digunakan untuk menilai syarat boolean (Benar/Palsu) termasuk julat (range).</p>
                                        <div class="bg-slate-900 rounded p-3 text-xs md:text-sm code-font text-blue-300 overflow-x-auto whitespace-pre">
if (markah >= 50) {
  print("Lulus");
} else {
  print("Gagal");
}</div>
                                    </div>
                                </div>

                                <!-- Switch-Case -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden hover:-translate-y-1 transition-transform">
                                    <div class="bg-purple-900/50 p-4 border-b border-purple-500/30 flex items-center gap-2">
                                        <i class="fas fa-list-ul text-purple-400"></i>
                                        <h3 class="font-bold text-purple-100">2. switch-case</h3>
                                    </div>
                                    <div class="p-4 md:p-5">
                                        <p class="text-xs md:text-sm text-slate-300 mb-4">Digunakan apabila menguji pemboleh ubah dengan nilai-nilai tetap spesifik (cth: menu).</p>
                                        <div class="bg-slate-900 rounded p-3 text-xs md:text-sm code-font text-purple-300 overflow-x-auto whitespace-pre">
switch(hari) {
  case 1: print("Isnin"); break;
  case 2: print("Selasa"); break;
  default: print("Cuti");
}</div>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-4"><i class="fas fa-dumbbell mr-2 text-blue-400"></i>Cabaran Kefahaman</h3>
                                <p class="text-sm text-slate-300 mb-4">Untuk sistem pesanan makanan restoran yang mempunyai menu 1 hingga 5, struktur manakah yang **PALING SESUAI** dan efisien?</p>
                                
                                <div class="flex flex-col md:flex-row gap-3">
                                    <select id="m1-q1" class="bg-slate-700 text-white text-sm rounded border border-slate-600 focus:border-blue-500 p-3 outline-none w-full md:w-auto">
                                        <option value="">-- Pilih Struktur --</option>
                                        <option value="if">if-else bersarang</option>
                                        <option value="switch">switch-case</option>
                                    </select>
                                    <button onclick="checkM1()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 md:py-2 rounded-lg font-semibold transition-colors flex-shrink-0 text-sm md:text-base">Semak Jawapan</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul2':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-orange-500/20 text-orange-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.4.2</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Operator Hubungan & Logikal</h2>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 mb-8">
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
                                    <h3 class="font-bold text-white mb-3 border-b border-slate-700 pb-2">Operator Hubungan</h3>
                                    <ul class="text-sm text-slate-300 space-y-2">
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300 w-10 inline-block text-center">==</code> Sama dengan</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300 w-10 inline-block text-center">!=</code> Tidak sama</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300 w-10 inline-block text-center">&gt;</code> Lebih besar</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300 w-10 inline-block text-center">&lt;</code> Lebih kecil</li>
                                    </ul>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
                                    <h3 class="font-bold text-white mb-3 border-b border-slate-700 pb-2">Operator Logikal</h3>
                                    <ul class="text-sm text-slate-300 space-y-2">
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-emerald-300 w-10 inline-block text-center">&&</code> (AND) Kedua-dua mesti Benar</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-emerald-300 w-10 inline-block text-center">||</code> (OR) Salah satu mesti Benar</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-emerald-300 w-10 inline-block text-center">!</code> (NOT) Menukar ke Palsu</li>
                                    </ul>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                                <div class="bg-slate-700/50 p-4 border-b border-slate-700">
                                    <h3 class="font-bold text-white">Latihan Kod</h3>
                                </div>
                                <div class="p-5 md:p-6">
                                    <p class="text-sm text-slate-300 mb-4">Pelajar perlukan markah > 40 <strong>DAN</strong> kehadiran == 100. Tentukan hasil operasi di bawah.</p>
                                    
                                    <div class="bg-slate-900 rounded p-4 text-xs md:text-sm code-font text-slate-300 mb-6 overflow-x-auto whitespace-pre">
int markah = 35;
int kehadiran = 100;

boolean layak = <span class="text-orange-300">(markah &gt; 40)</span> <span class="text-emerald-300">&&</span> <span class="text-orange-300">(kehadiran == 100)</span>;</div>
                                    
                                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                                        <p class="text-sm text-slate-300">Apakah nilai <code class="bg-slate-700 px-1 rounded">layak</code>?</p>
                                        <div class="flex gap-2 w-full md:w-auto">
                                            <button onclick="checkM2('true')" class="flex-1 md:flex-none bg-slate-700 hover:bg-emerald-600 text-white px-6 py-3 md:py-2 rounded-lg font-semibold transition-colors border border-slate-600 text-sm">TRUE</button>
                                            <button onclick="checkM2('false')" class="flex-1 md:flex-none bg-slate-700 hover:bg-rose-600 text-white px-6 py-3 md:py-2 rounded-lg font-semibold transition-colors border border-slate-600 text-sm">FALSE</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul3':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-green-500/20 text-green-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.4.3</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Struktur Kawalan Ulangan</h2>
                            </div>
                            
                            <div class="space-y-4 md:space-y-6 mb-8 md:mb-10">
                                <!-- For -->
                                <div class="bg-slate-800 p-4 md:p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                                    <div class="bg-slate-900 w-full md:w-1/3 p-3 md:p-4 rounded text-xs md:text-sm code-font text-green-300 overflow-x-auto whitespace-pre">
for(int i=0; i<5; i++) {
  print("Helo");
}</div>
                                    <div class="w-full md:w-2/3">
                                        <h3 class="text-lg md:text-xl font-bold text-white mb-1 md:mb-2">1. Gelung 'for'</h3>
                                        <p class="text-slate-400 text-xs md:text-sm">Bila <strong>bilangan ulangan telah diketahui</strong> awal-awal.</p>
                                    </div>
                                </div>

                                <!-- While -->
                                <div class="bg-slate-800 p-4 md:p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                                    <div class="bg-slate-900 w-full md:w-1/3 p-3 md:p-4 rounded text-xs md:text-sm code-font text-blue-300 overflow-x-auto whitespace-pre">
while(duit > 0) {
  print("Beli");
  duit--;
}</div>
                                    <div class="w-full md:w-2/3">
                                        <h3 class="text-lg md:text-xl font-bold text-white mb-1 md:mb-2">2. Gelung 'while'</h3>
                                        <p class="text-slate-400 text-xs md:text-sm">Bila bilangan ulangan <strong>tidak diketahui</strong>. Menyemak syarat pada <strong>permulaan</strong>.</p>
                                    </div>
                                </div>

                                <!-- Do-While -->
                                <div class="bg-slate-800 p-4 md:p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row items-start md:items-center gap-4 md:gap-6">
                                    <div class="bg-slate-900 w-full md:w-1/3 p-3 md:p-4 rounded text-xs md:text-sm code-font text-purple-300 overflow-x-auto whitespace-pre">
do {
  print("Teka");
} while (salah);</div>
                                    <div class="w-full md:w-2/3">
                                        <h3 class="text-lg md:text-xl font-bold text-white mb-1 md:mb-2">3. Gelung 'do-while'</h3>
                                        <p class="text-slate-400 text-xs md:text-sm">Menyemak syarat pada <strong>hujung</strong> gelung. Blok kod dijalankan <strong>sekurang-kurangnya sekali</strong>.</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-4">Uji Minda</h3>
                                <p class="text-sm text-slate-300 mb-4">Atur cara meminta pengguna meneka sekurang-kurangnya sekali. Struktur manakah paling sesuai?</p>
                                
                                <div class="flex flex-wrap gap-2 md:gap-3">
                                    <button onclick="checkM3('for')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-4 py-2 transition-colors">for</button>
                                    <button onclick="checkM3('while')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-4 py-2 transition-colors">while</button>
                                    <button onclick="checkM3('dowhile')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-4 py-2 transition-colors font-bold text-purple-300">do-while</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul4':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-purple-500/20 text-purple-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">1.4.4</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Aplikasi Ulangan</h2>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                                <div class="bg-slate-800 border border-slate-700 p-4 md:p-5 rounded-xl text-center">
                                    <h3 class="font-bold text-white text-base md:text-lg mb-2">Inc / Dec</h3>
                                    <div class="text-2xl md:text-3xl font-black text-rose-400 mb-3 tracking-widest">++ / --</div>
                                    <p class="text-xs md:text-sm text-slate-400">Menambah atau menolak nilai sebanyak 1. (Kaunter gelung)</p>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 p-4 md:p-5 rounded-xl text-center">
                                    <h3 class="font-bold text-white text-base md:text-lg mb-2">Class Math</h3>
                                    <div class="text-base md:text-lg font-black text-blue-400 mb-3 code-font">Math.random()</div>
                                    <p class="text-xs md:text-sm text-slate-400">Menjana nombor rawak secara automatik.</p>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 p-4 md:p-5 rounded-xl text-center sm:col-span-2 md:col-span-1">
                                    <h3 class="font-bold text-white text-base md:text-lg mb-2">Bendera</h3>
                                    <div class="text-base md:text-lg font-black text-emerald-400 mb-3 code-font">boolean</div>
                                    <p class="text-xs md:text-sm text-slate-400">Isyarat untuk meneruskan atau memberhentikan gelung.</p>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6">

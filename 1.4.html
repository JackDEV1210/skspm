<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademi Pengekodan: Struktur Kawalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #e2e8f0; /* Slate 200 */
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }

        /* Custom Scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item.active {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            font-weight: 600;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden selection:bg-blue-500 selection:text-white">

    <!-- Sidebar Navigation -->
    <aside class="w-72 bg-slate-800 border-r border-slate-700 flex flex-col transition-all duration-300 z-20">
        <div class="p-6 border-b border-slate-700">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-sitemap text-blue-400"></i>
                Akademi Kod
            </h1>
            <p class="text-xs text-slate-400 mt-2">Sains Komputer - Topik 1.4</p>
        </div>

        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-300">Pengalaman (XP)</span>
                <span id="xp-counter" class="text-sm font-bold text-yellow-400">0 / 1500</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5">
                <div id="xp-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <!-- Butang Kembali ke Portal Utama -->
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 mb-4 rounded-lg text-left text-white bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600 shadow-md">
                <i class="fas fa-arrow-left w-5 text-center text-rose-400"></i>
                <span class="font-bold">Kembali ke Portal</span>
            </a>

            <div class="pt-2 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Modul Pembelajaran</div>
            <button onclick="loadModule('modul1')" id="nav-modul1" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-code-branch w-5 text-center text-blue-400"></i>
                <span>M1: Pilihan (1.4.1)</span>
            </button>
            <button onclick="loadModule('modul2')" id="nav-modul2" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-equals w-5 text-center text-orange-400"></i>
                <span>M2: Operator (1.4.2)</span>
            </button>
            <button onclick="loadModule('modul3')" id="nav-modul3" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-undo-alt w-5 text-center text-green-400"></i>
                <span>M3: Ulangan (1.4.3)</span>
            </button>
            <button onclick="loadModule('modul4')" id="nav-modul4" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-plus-circle w-5 text-center text-purple-400"></i>
                <span>M4: Aplikasi (1.4.4)</span>
            </button>
            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Penilaian</div>
            <button onclick="loadModule('ujian')" id="nav-ujian" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-trophy w-5 text-center text-yellow-400"></i>
                <span>Ujian Akhir (Boss)</span>
            </button>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 bg-slate-900 relative overflow-y-auto">
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-5 right-5 z-50 transform transition-transform duration-300 translate-x-full glass-panel px-6 py-4 rounded-lg shadow-xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400 text-xl"></i>
            <div>
                <h4 id="toast-title" class="font-bold text-white">Berjaya!</h4>
                <p id="toast-msg" class="text-sm text-slate-300">Jawapan anda tepat. +50 XP</p>
            </div>
        </div>

        <div id="content-area" class="max-w-5xl mx-auto p-8 pb-20">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        // --- State Management ---
        let currentXP = 0;
        const state = {
            m1_done: false,
            m2_done: false,
            m3_done: false,
            m4_done: false,
            ujian_done: false
        };

        // --- Utility Functions ---
        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 1500) currentXP = 1500;
            document.getElementById('xp-counter').innerText = `${currentXP} / 1500`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 1500) * 100}%`;
            
            // Highlight animation
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => {
                toast.classList.add('translate-x-full');
            }, 3000);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${moduleId}`).classList.add('active');
        }

        // --- Render Functions ---
        function loadModule(moduleId) {
            const container = document.getElementById('content-area');
            updateNavActive(moduleId);
            window.scrollTo(0, 0);
            
            let html = '';

            switch (moduleId) {
                case 'modul1':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="bg-blue-500/20 text-blue-400 py-1 px-3 rounded-full text-sm font-bold">1.4.1</span>
                                <h2 class="text-3xl font-bold text-white">Struktur Kawalan Pilihan</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 text-lg">Membenarkan atur cara membuat keputusan untuk melaksanakan blok kod tertentu berdasarkan syarat yang diuji.</p>

                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
                                <!-- If-Else -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden hover:-translate-y-1 transition-transform">
                                    <div class="bg-blue-900/50 p-4 border-b border-blue-500/30 flex items-center gap-2">
                                        <i class="fas fa-code-branch text-blue-400"></i>
                                        <h3 class="font-bold text-blue-100">1. if-else</h3>
                                    </div>
                                    <div class="p-5">
                                        <p class="text-sm text-slate-300 mb-4">Digunakan apabila terdapat syarat boolean (Benar/Palsu) yang perlu dinilai, termasuk julat (range).</p>
                                        <div class="bg-slate-900 rounded p-3 text-sm code-font text-blue-300 mb-2">
                                            if (markah >= 50) {<br>
                                            &nbsp;&nbsp;print("Lulus");<br>
                                            } else {<br>
                                            &nbsp;&nbsp;print("Gagal");<br>
                                            }
                                        </div>
                                    </div>
                                </div>

                                <!-- Switch-Case -->
                                <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden hover:-translate-y-1 transition-transform">
                                    <div class="bg-purple-900/50 p-4 border-b border-purple-500/30 flex items-center gap-2">
                                        <i class="fas fa-list-ul text-purple-400"></i>
                                        <h3 class="font-bold text-purple-100">2. switch-case</h3>
                                    </div>
                                    <div class="p-5">
                                        <p class="text-sm text-slate-300 mb-4">Digunakan apabila kita menguji satu pemboleh ubah dengan nilai-nilai tetap yang spesifik (contoh: menu pilihan).</p>
                                        <div class="bg-slate-900 rounded p-3 text-sm code-font text-purple-300 mb-2">
                                            switch(hari) {<br>
                                            &nbsp;&nbsp;case 1: print("Isnin"); break;<br>
                                            &nbsp;&nbsp;case 2: print("Selasa"); break;<br>
                                            &nbsp;&nbsp;default: print("Cuti");<br>
                                            }
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Latihan -->
                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
                                <h3 class="text-xl font-bold text-white mb-4"><i class="fas fa-dumbbell mr-2 text-blue-400"></i>Cabaran Kefahaman</h3>
                                <p class="text-sm text-slate-300 mb-4">Anda diminta membina sebuah sistem pesanan makanan restoran yang mempunyai menu 1 hingga 5. Struktur manakah yang **PALING SESUAI** dan efisien untuk digunakan?</p>
                                
                                <div class="space-y-4">
                                    <select id="m1-q1" class="bg-slate-700 text-white text-sm rounded border border-slate-600 focus:border-blue-500 focus:ring-blue-500 p-2.5 outline-none w-full md:w-1/2">
                                        <option value="">-- Pilih Struktur Kawalan --</option>
                                        <option value="if">if-else bersarang</option>
                                        <option value="switch">switch-case</option>
                                    </select>
                                </div>
                                
                                <div class="mt-6 flex justify-end">
                                    <button onclick="checkM1()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-colors">Semak Jawapan</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul2':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="bg-orange-500/20 text-orange-400 py-1 px-3 rounded-full text-sm font-bold">1.4.2</span>
                                <h2 class="text-3xl font-bold text-white">Operator Hubungan & Logikal</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 text-lg">Struktur kawalan pilihan menjadi lebih berkuasa apabila kita menggabungkan beberapa syarat sekaligus menggunakan operator.</p>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
                                    <h3 class="font-bold text-white mb-3 border-b border-slate-700 pb-2">Operator Hubungan</h3>
                                    <ul class="text-sm text-slate-300 space-y-2">
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300">==</code> Sama dengan</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300">!=</code> Tidak sama dengan</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300">&gt;</code> Lebih besar</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300">&lt;</code> Lebih kecil</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300">&gt;=</code> Lebih besar atau sama</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-orange-300">&lt;=</code> Lebih kecil atau sama</li>
                                    </ul>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
                                    <h3 class="font-bold text-white mb-3 border-b border-slate-700 pb-2">Operator Logikal</h3>
                                    <ul class="text-sm text-slate-300 space-y-2">
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-emerald-300">&&</code> (AND) Kedua-dua mesti Benar</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-emerald-300">||</code> (OR) Salah satu mesti Benar</li>
                                        <li><code class="bg-slate-900 px-2 py-1 rounded text-emerald-300">!</code> (NOT) Menukar Benar jadi Palsu</li>
                                    </ul>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
                                <div class="bg-slate-700/50 p-4 border-b border-slate-700 flex justify-between items-center">
                                    <h3 class="font-bold text-white">Latihan Kod</h3>
                                </div>
                                <div class="p-6">
                                    <p class="text-sm text-slate-300 mb-4">Seorang pelajar perlu mendapat markah lebih daripada 40 <strong>DAN</strong> peratus kehadiran mesti sama dengan 100 untuk mendapat Sijil. Tentukan hasil (True/False) bagi pernyataan ini berdasarkan nilai pemboleh ubah di bawah.</p>
                                    
                                    <div class="bg-slate-900 rounded p-4 text-sm code-font text-slate-300 mb-6">
                                        int markah = 35;<br>
                                        int kehadiran = 100;<br><br>
                                        <span class="text-slate-500">// Penilaian Syarat:</span><br>
                                        boolean layak = <span class="text-orange-300">(markah &gt; 40)</span> <span class="text-emerald-300">&&</span> <span class="text-orange-300">(kehadiran == 100)</span>;
                                    </div>
                                    
                                    <div class="flex items-center justify-between">
                                        <p class="text-sm text-slate-300">Apakah nilai akhir bagi pemboleh ubah <code class="bg-slate-700 px-1 rounded">layak</code>?</p>
                                        <div class="flex gap-2">
                                            <button onclick="checkM2('true')" class="bg-slate-700 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors border border-slate-600">TRUE</button>
                                            <button onclick="checkM2('false')" class="bg-slate-700 hover:bg-rose-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors border border-slate-600">FALSE</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul3':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="bg-green-500/20 text-green-400 py-1 px-3 rounded-full text-sm font-bold">1.4.3</span>
                                <h2 class="text-3xl font-bold text-white">Struktur Kawalan Ulangan</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 text-lg">Membenarkan atur cara mengulang blok kod yang sama berulang kali selagi syarat yang ditetapkan adalah benar.</p>

                            <div class="space-y-6 mb-10">
                                <!-- For -->
                                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row items-center gap-6">
                                    <div class="bg-slate-900 w-full md:w-1/3 p-4 rounded text-sm code-font text-green-300">
                                        for(int i=0; i<5; i++) {<br>
                                        &nbsp;&nbsp;print("Helo");<br>
                                        }
                                    </div>
                                    <div class="w-full md:w-2/3">
                                        <h3 class="text-xl font-bold text-white mb-2">1. Gelung 'for'</h3>
                                        <p class="text-slate-400 text-sm">Digunakan apabila <strong>bilangan ulangan telah diketahui</strong> sebelum gelung bermula. Mempunyai nilai awal, syarat, dan kaunter (kemaskini) di dalam satu baris yang sama.</p>
                                    </div>
                                </div>

                                <!-- While -->
                                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row items-center gap-6">
                                    <div class="bg-slate-900 w-full md:w-1/3 p-4 rounded text-sm code-font text-blue-300">
                                        while(duit > 0) {<br>
                                        &nbsp;&nbsp;print("Beli barang");<br>
                                        &nbsp;&nbsp;duit--;<br>
                                        }
                                    </div>
                                    <div class="w-full md:w-2/3">
                                        <h3 class="text-xl font-bold text-white mb-2">2. Gelung 'while'</h3>
                                        <p class="text-slate-400 text-sm">Digunakan apabila bilangan ulangan <strong>tidak diketahui</strong>. Ia akan menyemak syarat pada <strong>permulaan</strong>. Jika palsu dari awal, blok kod tidak akan dijalankan langsung.</p>
                                    </div>
                                </div>

                                <!-- Do-While -->
                                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 flex flex-col md:flex-row items-center gap-6">
                                    <div class="bg-slate-900 w-full md:w-1/3 p-4 rounded text-sm code-font text-purple-300">
                                        do {<br>
                                        &nbsp;&nbsp;print("Sila teka");<br>
                                        } while (salah);
                                    </div>
                                    <div class="w-full md:w-2/3">
                                        <h3 class="text-xl font-bold text-white mb-2">3. Gelung 'do-while'</h3>
                                        <p class="text-slate-400 text-sm">Menyemak syarat pada <strong>hujung</strong> gelung. Ini memastikan blok kod di dalamnya akan dijalankan <strong>sekurang-kurangnya sekali</strong> walaupun syarat asal adalah palsu.</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
                                <h3 class="text-xl font-bold text-white mb-4">Uji Minda</h3>
                                <p class="text-sm text-slate-300 mb-4">Anda membina satu permainan meneka kata laluan. Atur cara mesti meminta pengguna meneka sekurang-kurangnya sekali. Jika salah, ia ulang bertanya. Struktur manakah paling sesuai?</p>
                                
                                <div class="flex gap-3">
                                    <button onclick="checkM3('for')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-4 py-2 transition-colors">for</button>
                                    <button onclick="checkM3('while')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-4 py-2 transition-colors">while</button>
                                    <button onclick="checkM3('dowhile')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-4 py-2 transition-colors font-bold text-purple-300">do-while</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul4':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="bg-purple-500/20 text-purple-400 py-1 px-3 rounded-full text-sm font-bold">1.4.4</span>
                                <h2 class="text-3xl font-bold text-white">Aplikasi Ulangan & Fungsi Terbina</h2>
                            </div>
                            
                            <p class="text-slate-300 mb-6 text-lg">Mengenal pasti komponen dan kaedah penting yang sering digabungkan bersama struktur kawalan ulangan.</p>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                <div class="bg-slate-800 border border-slate-700 p-5 rounded-xl text-center">
                                    <h3 class="font-bold text-white text-lg mb-2">Increment / Decrement</h3>
                                    <div class="text-3xl font-black text-rose-400 mb-3 tracking-widest">++ / --</div>
                                    <p class="text-sm text-slate-400">Operator <code class="text-rose-300">++</code> akan menambah nilai pemboleh ubah sebanyak 1. <code class="text-rose-300">--</code> akan menolak sebanyak 1. Berfungsi sebagai kaunter gelung.</p>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 p-5 rounded-xl text-center">
                                    <h3 class="font-bold text-white text-lg mb-2">Class Math</h3>
                                    <div class="text-lg font-black text-blue-400 mb-3 code-font">Math.random()</div>
                                    <p class="text-sm text-slate-400">Digunakan untuk menjana nombor rawak secara automatik. Sering digunakan dalam gelung untuk membina permainan atau simulasi.</p>
                                </div>
                                <div class="bg-slate-800 border border-slate-700 p-5 rounded-xl text-center">
                                    <h3 class="font-bold text-white text-lg mb-2">Bendera (Boolean)</h3>
                                    <div class="text-lg font-black text-emerald-400 mb-3 code-font">true / false</div>
                                    <p class="text-sm text-slate-400">Pemboleh ubah boolean digunakan sebagai isyarat (flag) untuk mengawal aliran logik sama ada gelung patut diteruskan atau diberhentikan.</p>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-6">
                                <h3 class="text-xl font-bold text-white mb-4">Latihan Kod: Kaunter Increment</h3>
                                <p class="text-sm text-slate-300 mb-4">Berdasarkan potongan kod Java/C++ di bawah, berapakah nilai yang akan dipaparkan (di-print) ke skrin pada baris akhir?</p>
                                
                                <div class="bg-slate-900 rounded p-4 text-sm code-font text-slate-300 mb-6">
                                    int x = 5;<br>
                                    x++;<br>
                                    x++;<br>
                                    print(x);
